<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Заявка отправлена — SYNDICAT</title>
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--studio-black:#100904;--warm-cream:#ffedd7;--burnt-sienna:#dc5000;--grey-brown:#6c5f51;--dark-cork:#382416}
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--studio-black);color:var(--warm-cream);font-family:'Figtree',system-ui,sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;-webkit-font-smoothing:antialiased}
  .box{max-width:480px}
  .mark{font-size:48px;color:var(--burnt-sienna);margin-bottom:20px}
  h1{font-size:32px;font-weight:600;letter-spacing:-0.5px;margin-bottom:14px}
  p{font-size:16px;line-height:1.5;color:var(--grey-brown);margin-bottom:30px}
  a{display:inline-block;background:var(--dark-cork);color:var(--warm-cream);text-decoration:none;border:1px solid var(--dark-cork);border-radius:36px;padding:14px 28px;font-size:14px;font-weight:500;transition:border-color .25s ease}
  a:hover{border-color:var(--burnt-sienna)}
</style>
</head>
<body>
  <div class="box">
    <div class="mark">✓</div>
    <h1>Заявка отправлена</h1>
    <p>Спасибо! Мы получили вашу заявку и свяжемся с вами в ближайшее время. Обычно отвечаем в течение рабочего дня.</p>
    <a href="index.html">На главную</a>
  </div>
</body>
</html>
